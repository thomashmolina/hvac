name: Deploy to S3

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Ensure Terraform state bucket exists
        run: |
          aws s3api head-bucket --bucket hvac-terraform-state 2>/dev/null || \
          aws s3api create-bucket --bucket hvac-terraform-state --region us-west-2 \
            --create-bucket-configuration LocationConstraint=us-west-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      - name: Import existing resources
        working-directory: terraform
        run: |
          terraform import aws_s3_bucket.website hvac-site 2>/dev/null || true
          terraform import aws_s3_bucket_public_access_block.website hvac-site 2>/dev/null || true
          terraform import aws_s3_bucket_policy.website hvac-site 2>/dev/null || true
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
      - name: Get CloudFront distribution ID
        id: cloudfront
        working-directory: terraform
        run: echo "dist_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: aws s3 sync dist/ s3://hvac-site --delete
      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.cloudfront.outputs.dist_id }} --paths "/*"
